<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1750" viewBox="0 0 3000 1750" role="img" aria-labelledby="title desc">
  <title id="title">re0-rag Agentic RAG 架构</title>
  <desc id="desc">展示 LangGraph 状态流、LLM 自主路由、向量与 BM25 主检索、BCE 精排、表格证据、可选 Neo4j 图谱增强、答案生成、检查与重试。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#0f766e"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; }
      .h1 { font-size: 50px; font-weight: 800; fill: #0f172a; }
      .sub { font-size: 24px; font-weight: 400; fill: #475569; }
      .section { font-size: 26px; font-weight: 800; fill: #0f172a; }
      .node { font-size: 25px; font-weight: 750; fill: #0f172a; text-anchor: middle; }
      .detail { font-size: 20px; font-weight: 400; fill: #475569; text-anchor: middle; }
      .mono { font: 650 18px "Cascadia Mono", Consolas, monospace; fill: #2563eb; text-anchor: middle; }
      .tag { font-size: 18px; font-weight: 750; fill: #ffffff; text-anchor: middle; }
      .note { font-size: 19px; font-weight: 500; fill: #475569; }
      .edge { fill: none; stroke: #64748b; stroke-width: 4; marker-end: url(#arrow); }
      .edge-blue { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrowBlue); }
      .edge-green { fill: none; stroke: #0f766e; stroke-width: 4; marker-end: url(#arrowGreen); }
      .conditional { fill: none; stroke: #0f766e; stroke-width: 4; stroke-dasharray: 13 10; marker-end: url(#arrowGreen); }
      .retry { fill: none; stroke: #d97706; stroke-width: 4; stroke-dasharray: 13 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="3000" height="1750" fill="#f8fafc"/>
  <rect x="32" y="28" width="2936" height="1694" rx="34" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>

  <text x="88" y="102" class="h1">re0-rag · Agentic RAG 架构</text>
  <text x="88" y="148" class="sub">LLM 自主决定主检索 tool 与图谱增强开关；检索结果统一进入证据生成、答案检查与反馈重试。</text>

  <!-- Legend -->
  <line x1="2200" y1="104" x2="2285" y2="104" class="edge"/>
  <text x="2310" y="112" class="note">固定状态流</text>
  <line x1="2525" y1="104" x2="2610" y2="104" class="conditional"/>
  <text x="2635" y="112" class="note">条件执行 / 控制信号</text>

  <!-- LangGraph state lane -->
  <rect x="72" y="205" width="475" height="1065" rx="28" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="72" y="205" width="475" height="68" rx="28" fill="#e2e8f0"/>
  <rect x="72" y="245" width="475" height="28" fill="#e2e8f0"/>
  <text x="105" y="249" class="section">LangGraph 状态流</text>

  <rect x="127" y="314" width="365" height="116" rx="20" fill="#eef2ff" stroke="#6366f1" stroke-width="3" filter="url(#shadow)"/>
  <text x="309" y="361" class="node">输入问题</text>
  <text x="309" y="396" class="mono">input_node</text>

  <rect x="127" y="494" width="365" height="132" rx="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3" filter="url(#shadow)"/>
  <text x="309" y="539" class="node">多轮记忆摘要</text>
  <text x="309" y="572" class="detail">消息数 &gt; 10 时压缩早期对话</text>
  <text x="309" y="603" class="mono">summarize_memory_node</text>

  <rect x="127" y="690" width="365" height="132" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="3" filter="url(#shadow)"/>
  <text x="309" y="735" class="node">查询改写</text>
  <text x="309" y="768" class="detail">摘要 + 近期历史 + 当前问题</text>
  <text x="309" y="799" class="mono">rewrite_node</text>

  <rect x="112" y="886" width="395" height="208" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="4" filter="url(#shadow)"/>
  <rect x="205" y="906" width="210" height="34" rx="17" fill="#2563eb"/>
  <text x="310" y="930" class="tag">OpenAI 兼容 LLM</text>
  <text x="309" y="983" class="node">自主路由决策</text>
  <text x="309" y="1019" class="detail">结合 query、Judge 反馈、路由历史</text>
  <text x="309" y="1053" class="mono">{ action, use_graph, query, reason }</text>
  <text x="309" y="1080" class="mono">route_node</text>

  <path d="M309 430 V494" class="edge"/>
  <path d="M309 626 V690" class="edge"/>
  <path d="M309 822 V886" class="edge"/>

  <!-- MemorySaver -->
  <rect x="95" y="1146" width="428" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="309" y="1182" class="node" style="font-size:22px">MemorySaver · thread_id</text>
  <text x="309" y="1214" class="detail">messages + conversation_summary 跨轮保留</text>

  <!-- Primary tool container -->
  <rect x="605" y="205" width="1615" height="1065" rx="28" fill="#fbfdff" stroke="#bfdbfe" stroke-width="3"/>
  <rect x="605" y="205" width="1615" height="68" rx="28" fill="#dbeafe"/>
  <rect x="605" y="245" width="1615" height="28" fill="#dbeafe"/>
  <text x="638" y="249" class="section">主检索 Tool · action 三选一</text>
  <text x="1620" y="249" class="note">图谱检索不属于这里的第四个 action</text>

  <!-- Vector lane -->
  <rect x="640" y="310" width="1545" height="264" rx="22" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>
  <rect x="666" y="330" width="250" height="52" rx="26" fill="#0284c7"/>
  <text x="791" y="363" class="tag">vector_search_tool</text>

  <rect x="667" y="414" width="245" height="110" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="789" y="457" class="node">本地 Embedding</text>
  <text x="789" y="492" class="detail">all-MiniLM-L6-v2</text>

  <rect x="982" y="396" width="310" height="146" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="1137" y="437" class="node">Qdrant Dense 初筛</text>
  <text x="1137" y="472" class="detail">正文 child candidates · Top 12</text>
  <text x="1137" y="507" class="detail">表格独立召回 · Top 3</text>

  <rect x="1362" y="404" width="270" height="130" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <text x="1497" y="451" class="node">BCE Rerank</text>
  <text x="1497" y="486" class="detail">仅精排正文 child</text>
  <text x="1497" y="516" class="detail">12 → Top 4</text>

  <rect x="1702" y="390" width="430" height="158" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  <text x="1917" y="431" class="node">Parent 回填 + Table 合并</text>
  <text x="1917" y="468" class="detail">命中 child → 完整 parent 章节</text>
  <text x="1917" y="502" class="detail">关联表格 + Dense 表格召回去重</text>
  <text x="1917" y="532" class="mono">evidence = parents + tables</text>

  <path d="M912 469 H982" class="edge-blue"/>
  <path d="M1292 469 H1362" class="edge-blue"/>
  <path d="M1632 469 H1702" class="edge-blue"/>
  <path d="M1292 516 C1460 568 1570 568 1702 516" class="edge-green"/>
  <text x="1490" y="565" class="note" text-anchor="middle">表格不经过 Rerank，直接参与合并</text>

  <!-- Keyword lane -->
  <rect x="640" y="605" width="1545" height="264" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="666" y="625" width="275" height="52" rx="26" fill="#475569"/>
  <text x="803" y="658" class="tag">keyword_search_tool</text>

  <rect x="667" y="709" width="245" height="110" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
  <text x="789" y="752" class="node">BM25 Sparse Query</text>
  <text x="789" y="787" class="detail">术语 / 标题 / 指标精确匹配</text>

  <rect x="982" y="691" width="310" height="146" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
  <text x="1137" y="732" class="node">Qdrant BM25 初筛</text>
  <text x="1137" y="767" class="detail">正文 child candidates · Top 12</text>
  <text x="1137" y="802" class="detail">表格独立召回 · Top 3</text>

  <rect x="1362" y="699" width="270" height="130" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <text x="1497" y="746" class="node">BCE Rerank</text>
  <text x="1497" y="781" class="detail">仅精排正文 child</text>
  <text x="1497" y="811" class="detail">12 → Top 4</text>

  <rect x="1702" y="685" width="430" height="158" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  <text x="1917" y="726" class="node">Parent 回填 + Table 合并</text>
  <text x="1917" y="763" class="detail">命中 child → 完整 parent 章节</text>
  <text x="1917" y="797" class="detail">关联表格 + BM25 表格召回去重</text>
  <text x="1917" y="827" class="mono">evidence = parents + tables</text>

  <path d="M912 764 H982" class="edge-blue"/>
  <path d="M1292 764 H1362" class="edge-blue"/>
  <path d="M1632 764 H1702" class="edge-blue"/>
  <path d="M1292 811 C1460 863 1570 863 1702 811" class="edge-green"/>
  <text x="1490" y="860" class="note" text-anchor="middle">表格不经过 Rerank，直接参与合并</text>

  <!-- No retrieval lane -->
  <rect x="640" y="900" width="1545" height="220" rx="22" fill="#fafafa" stroke="#d4d4d8" stroke-width="2"/>
  <rect x="666" y="920" width="250" height="52" rx="26" fill="#71717a"/>
  <text x="791" y="953" class="tag">no_retrieval_tool</text>
  <rect x="667" y="1000" width="615" height="84" rx="18" fill="#ffffff" stroke="#a1a1aa" stroke-width="3"/>
  <text x="974" y="1034" class="node">跳过本地论文库主检索</text>
  <text x="974" y="1067" class="detail">寒暄、系统操作或普通改写 → 空 primary evidence</text>

  <!-- Router action branches -->
  <path d="M507 958 H565 Q590 958 590 469 H667" class="edge-blue"/>
  <path d="M507 990 H602 Q620 990 620 764 H667" class="edge-blue"/>
  <path d="M507 1022 H667" class="edge-blue"/>

  <!-- Unified primary result -->
  <rect x="1702" y="924" width="430" height="158" rx="18" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
  <text x="1917" y="965" class="node">统一 Tool Result</text>
  <text x="1917" y="1001" class="detail">documents · parents · tables</text>
  <text x="1917" y="1035" class="detail">evidence · sources · summary</text>
  <text x="1917" y="1066" class="mono">tool_node → tool_results[]</text>
  <path d="M2120 548 C2162 625 2162 865 2120 924" class="edge"/>
  <path d="M2120 843 V924" class="edge"/>
  <path d="M1282 1042 H1702" class="edge"/>

  <!-- Graph augmentation -->
  <rect x="2285" y="205" width="645" height="865" rx="28" fill="#f7fffd" stroke="#99f6e4" stroke-width="3"/>
  <rect x="2285" y="205" width="645" height="68" rx="28" fill="#ccfbf1"/>
  <rect x="2285" y="245" width="645" height="28" fill="#ccfbf1"/>
  <text x="2318" y="249" class="section">可选图谱增强</text>

  <rect x="2350" y="325" width="515" height="118" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <text x="2607" y="370" class="node">graph_retrieval_node</text>
  <text x="2607" y="405" class="detail">主检索后始终经过此节点</text>

  <polygon points="2607,500 2750,585 2607,670 2464,585" fill="#f0fdfa" stroke="#0f766e" stroke-width="4"/>
  <text x="2607" y="578" class="node">use_graph?</text>
  <text x="2607" y="612" class="detail">路由控制位</text>

  <rect x="2370" y="735" width="475" height="145" rx="20" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  <text x="2607" y="780" class="node">graph_search_tool → Neo4j</text>
  <text x="2607" y="816" class="detail">Paper / Author / Year / Venue</text>
  <text x="2607" y="850" class="detail">Field / Keyword / 可解释关系路径</text>

  <rect x="2370" y="930" width="475" height="96" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <text x="2607" y="968" class="node">最终 Evidence</text>
  <text x="2607" y="1002" class="detail">primary evidence + graph evidence</text>

  <path d="M2132 1003 H2240 Q2260 1003 2260 384 H2350" class="edge"/>
  <path d="M2607 443 V500" class="edge"/>
  <path d="M2607 670 V735" class="edge-green"/>
  <text x="2632" y="708" class="note">true</text>
  <path d="M2750 585 H2890 V978 H2845" class="conditional"/>
  <text x="2865" y="760" class="note" transform="rotate(90 2865 760)">false：保留主检索证据</text>
  <path d="M2607 880 V930" class="edge-green"/>

  <!-- use_graph control signal -->
  <path d="M507 1050 H560 V1295 H2245 Q2270 1295 2270 585 H2464" class="conditional"/>
  <text x="1415" y="1283" class="mono">use_graph = true / false（Neo4j 不可用时自动降级为 false）</text>

  <!-- Answer, judge and retry -->
  <rect x="720" y="1350" width="470" height="158" rx="22" fill="#fdf4ff" stroke="#c026d3" stroke-width="3" filter="url(#shadow)"/>
  <rect x="832" y="1368" width="245" height="34" rx="17" fill="#c026d3"/>
  <text x="954" y="1392" class="tag">OpenAI 兼容 LLM</text>
  <text x="955" y="1441" class="node">基于证据生成回答</text>
  <text x="955" y="1476" class="detail">对话历史 + 最终 evidence + 当前问题</text>

  <rect x="1370" y="1350" width="520" height="158" rx="22" fill="#fffbeb" stroke="#d97706" stroke-width="3" filter="url(#shadow)"/>
  <text x="1630" y="1394" class="node">答案检查 Judge</text>
  <text x="1630" y="1431" class="detail">是否回答问题 · 是否有证据支持</text>
  <text x="1630" y="1466" class="detail">是否存在幻觉 · 下一轮检索建议</text>
  <text x="1630" y="1495" class="mono">judge_node</text>

  <rect x="2120" y="1350" width="350" height="158" rx="22" fill="#eef2ff" stroke="#6366f1" stroke-width="3" filter="url(#shadow)"/>
  <text x="2295" y="1406" class="node">输出回答与来源</text>
  <text x="2295" y="1442" class="detail">通过，或已达到重试上限</text>
  <text x="2295" y="1477" class="mono">output_node → END</text>

  <path d="M2607 1026 V1255 H955 V1350" class="edge"/>
  <path d="M1190 1429 H1370" class="edge"/>
  <path d="M1890 1429 H2120" class="edge"/>
  <text x="2005" y="1411" class="note" text-anchor="middle">passed = true</text>

  <path d="M1630 1508 V1625 H48 V990 H112" class="retry"/>
  <text x="935" y="1608" class="note" text-anchor="middle">未通过且 retry_count ≤ 2：携带 Judge 反馈与 route_history 回到路由，不重复查询改写</text>

  <!-- Footer -->
  <rect x="2550" y="1350" width="325" height="158" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="2712" y="1392" class="node" style="font-size:21px">核心边界</text>
  <text x="2712" y="1426" class="detail">Graph 是增强开关</text>
  <text x="2712" y="1459" class="detail">不是主检索 action</text>
  <text x="2712" y="1492" class="detail">BCE 只精排正文 child</text>
</svg>
